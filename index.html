<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ovena Health · Commerce Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div style="display:flex; align-items:center; gap:18px;">
          <div class="brand">
            <span class="brand-mark">OVENA HEALTH</span>
            <span class="brand-name">Commerce Portal</span>
          </div>
          <div class="clock" id="clock" aria-live="polite">
            <span class="clock-time" id="clockTime">—</span>
            <span class="clock-meta" id="clockMeta">—</span>
          </div>
        </div>

        <nav class="tabs" role="tablist" id="tabs">
          <button class="tab" role="tab" data-tab="inventory" aria-selected="true">Inventory</button>
          <button class="tab" role="tab" data-tab="sales" aria-selected="false">Sales</button>
          <button class="tab" role="tab" data-tab="products" aria-selected="false">Products</button>
          <button class="tab" role="tab" data-tab="ads" aria-selected="false">Ads</button>
          <button class="tab" role="tab" data-tab="margins" aria-selected="false">Margins</button>
        </nav>

        <div class="topbar-right">
          <span class="saved-pill" id="savedPill">Not saved yet</span>
        </div>
      </header>

      <main>
        <section class="tab-panel active" id="panel-inventory" role="tabpanel" aria-labelledby="tab-inventory"></section>
        <section class="tab-panel" id="panel-sales" role="tabpanel" aria-labelledby="tab-sales"></section>
        <section class="tab-panel" id="panel-products" role="tabpanel" aria-labelledby="tab-products"></section>
        <section class="tab-panel" id="panel-ads" role="tabpanel" aria-labelledby="tab-ads"></section>
        <section class="tab-panel" id="panel-margins" role="tabpanel" aria-labelledby="tab-margins"></section>
      </main>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
