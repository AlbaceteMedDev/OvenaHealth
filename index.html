<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ovena Health · Commerce Portal</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Favicon: brand mark distilled to the arc + dots over a navy 'O' -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f3ecde'/%3E%3Cpath d='M 7 12 Q 16 5 25 12' fill='none' stroke='%236e9fab' stroke-width='1.6' stroke-linecap='round'/%3E%3Ccircle cx='7' cy='12' r='1.7' fill='%236e9fab'/%3E%3Ccircle cx='25' cy='12' r='1.7' fill='%236e9fab'/%3E%3Ctext x='16' y='25' font-family='-apple-system,Helvetica,sans-serif' font-size='11' font-weight='800' fill='%231a2843' text-anchor='middle' letter-spacing='-0.5'%3EO%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="assets/logo.png" />
    <meta name="theme-color" content="#f3ecde" />
  </head>
  <body>
    <!-- Reused chart gradients -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <linearGradient id="area-grad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"  stop-color="#0a0e1a" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="area-grad-alt" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"  stop-color="#0f766e" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="spark-grad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"  stop-color="#0f766e" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- Boot splash; replaced by login or app once JS resolves auth state -->
    <div id="boot" class="boot">
      <div class="boot-inner">
        <img class="boot-logo" src="assets/logo.png" alt="Ovena Health" />
        <div class="boot-spinner" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Login screen -->
    <div id="login" class="login" hidden>
      <div class="login-card">
        <img class="login-logo" src="assets/logo.png" alt="Ovena Health" />
        <p class="login-sub">Sign in to continue to the Commerce Portal.</p>
        <form id="loginForm" autocomplete="off" novalidate>
          <input
            type="password"
            id="loginPassword"
            class="login-input"
            placeholder="Team password"
            autocomplete="current-password"
            autofocus
            required
          />
          <button type="submit" class="login-submit" id="loginSubmit">
            <span class="btn-label">Sign in</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
          <p class="login-error" id="loginError" hidden></p>
        </form>
        <p class="login-foot">Ovena Health · Commerce Portal</p>
      </div>
    </div>

    <!-- App shell -->
    <div id="app" class="app" hidden>
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-logo" src="assets/logo.png" alt="Ovena Health" />
          <span class="brand-name">Commerce Portal</span>
        </div>

        <nav class="nav" id="nav" role="tablist" aria-label="Sections">
          <button class="nav-item" role="tab" data-tab="inventory" aria-selected="true">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 17l9 4 9-4"/><path d="M3 12l9 4 9-4"/>
            </svg>
            Inventory
          </button>
          <button class="nav-item" role="tab" data-tab="sales" aria-selected="false">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/>
            </svg>
            Sales
          </button>
          <button class="nav-item" role="tab" data-tab="products" aria-selected="false">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="3" width="7" height="7" rx="1.2"/>
              <rect x="3" y="14" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/>
            </svg>
            Products
          </button>
          <button class="nav-item" role="tab" data-tab="ads" aria-selected="false">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/>
            </svg>
            Ads
          </button>
          <button class="nav-item" role="tab" data-tab="margins" aria-selected="false">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="5" x2="5" y2="19"/><circle cx="7" cy="7" r="2.5"/><circle cx="17" cy="17" r="2.5"/>
            </svg>
            Margins
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="clock-row">
            <span class="clock-time" id="clockTime">—</span>
            <span class="clock-tz" id="clockTz">—</span>
          </div>
          <span class="clock-date" id="clockDate">—</span>
          <span class="saved-pill" id="savedPill">Not saved yet</span>
          <button class="btn ghost logout-btn" id="logoutBtn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-right:6px;">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
      </aside>

      <main class="main">
        <section class="tab-panel active" id="panel-inventory" role="tabpanel"></section>
        <section class="tab-panel" id="panel-sales" role="tabpanel"></section>
        <section class="tab-panel" id="panel-products" role="tabpanel"></section>
        <section class="tab-panel" id="panel-ads" role="tabpanel"></section>
        <section class="tab-panel" id="panel-margins" role="tabpanel"></section>
      </main>
    </div>

    <!-- Toast for transient errors (offline, save failed) -->
    <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
